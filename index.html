<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flagly</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #1d1d1f;
            background: #fff;
            padding: 4rem 1rem;
            max-width: 540px;
            margin: 0 auto;
            text-align: center;
        }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        p { color: #86868b; margin-bottom: 2rem; }
        .links {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            max-width: 320px;
            margin: 0 auto;
        }
        .links a {
            display: block;
            padding: 0.9rem 1.25rem;
            background: #f5f5f7;
            border-radius: 12px;
            color: #1d1d1f;
            text-decoration: none;
            font-weight: 500;
        }
        .links a:hover { background: #ebebed; }
    </style>
</head>
<body>
    <h1>Flagly</h1>
    <p>Learn all 254 flags of the world.</p>

    <div class="links">
        <a href="./support/">Support</a>
        <a href="./privacy/">Privacy Policy</a>
    </div>
</body>
</html>
